# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "gewgaw"
BBFILE_PATTERN_gewgaw = "^${LAYERDIR}/"
BBFILE_PRIORITY_gewgaw = "8"

LAYERDEPENDS_gewgaw = "core"
LAYERSERIES_COMPAT_gewgaw = "whinlatter"
