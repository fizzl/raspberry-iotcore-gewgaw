# gewgaw collector/submit configuration. Shell-style KEY=VALUE, parsed by both
# daemons. See scan_and_submit_daemons_design.md for the meaning of each knob.

GEWGAW_DB=/var/lib/gewgaw/gewgaw.db
GEWGAW_SOCK=/run/gewgaw/arbiter.sock
WIFI_IFACE=wlan0

# --- collector ---
SCAN_INTERVAL=30          # seconds between Wi-Fi scans
BLE_SCAN_SECONDS=10       # BLE discovery window per cycle
SESSION_GAP=300           # seconds without a sighting => close the session

# --- submit (steady state) ---
KNOWN_NETWORKS=/etc/gewgaw/networks.conf   # wpa_supplicant-native, runtime-only
ALLOW_OPEN=1              # also try discovered open networks
MAX_ATTEMPTS=4           # candidate APs to try per submit run
LEASE_SECONDS=180        # radio lease the submit daemon requests
CONNECT_TIMEOUT=45       # per-AP assoc+DHCP timeout
HTTP_CHECK_URL=http://connectivitycheck.gstatic.com/generate_204
SUBMIT_BATCH=200

# --- submit (boot phase, §8.1) ---
WAIT_FOR_SCAN=60         # max wait for the collector's first scan results
BOOT_CONNECT_BUDGET=300  # seconds to keep trying to get online at boot
BOOT_LEASE_SECONDS=360   # radio lease for the boot run
NTP_WAIT=30              # max wait for NTPSynchronized=yes after connecting
